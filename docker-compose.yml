services:
  mariadb:
    image: mariadb:11.4
    container_name: tickets-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: tickets
      MARIADB_USER: tickets
      MARIADB_PASSWORD: tickets_password
      MARIADB_ROOT_PASSWORD: root_password
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
